# tmux configuration - Mike
# High-signal Dracula Pro styling + Emacs awareness

# 0. Core Settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5

# 1. Keybindings
# Use C-a as prefix (more Emacs-like/ergonomic)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Emacs-style copy mode
setw -g mode-keys emacs

# 2. Dracula Pro (Van Helsing) Theme Integration
# Background: #282a36
# Selection: #44475a
# Foreground: #f8f8f2
# Comment: #6272a4
# Cyan: #8be9fd
# Green: #50fa7b
# Orange: #ffb86c
# Pink: #ff79c6
# Purple: #bd93f9
# Red: #ff5555
# Yellow: #f1fa8c

set -g status-style bg='#282a36',fg='#f8f8f2'
set -g status-left '#[bg=#f8f8f2,fg=#282a36,bold] #S '
set -g status-right '#[fg=#8be9fd,bg=#44475a] %Y-%m-%d #[fg=#f8f8f2,bg=#6272a4] %H:%M '
set -g window-status-current-style bg='#44475a',fg='#f1fa8c',bold
set -g pane-border-style fg='#44475a'
set -g pane-active-border-style fg='#bd93f9'
set -g message-style bg='#44475a',fg='#8be9fd'
